<form [formGroup]="loginForm" (submit)="login()">
  <div class="form-group">
    <input type="text" formControlName="userName" class="form-control" placeholder="Please Enter UserName">
  </div>
  <div class="form-group">
    <input type="password" formControlName="password" class="form-control" placeholder="Please Enter Password">
  </div>
  <button class="btn btn-primary" [disabled]="loginForm.invalid" type="submit">Login</button>

</form>
