<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" fixedInViewport [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'" [opened]="(isHandset$ | async) === false">
    <mat-toolbar>Menu</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="employee">Employee</a>
      <a mat-list-item routerLink="product">Product</a>
      <a mat-list-item routerLink="product/add">Add Product</a>
      <a mat-list-item routerLink="product/add/form">Add Product Form</a>
      <a mat-list-item routerLink="product/add/group">Add Product Group</a>
      <a mat-list-item routerLink="product/add/array">Add Product Array</a>
      <a mat-list-item routerLink="posts">Posts</a>
      <a mat-list-item routerLink="photos">Photos</a>
      <a mat-list-item
       [routerLink]="[{ outlets: { about: ['aboutus'] } }]">AboutUs</a>

    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <button type="button" aria-label="Toggle sidenav" mat-icon-button (click)="drawer.toggle()"
        *ngIf="isHandset$ | async">
        <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
      </button>
      <span>ecommerceapp</span>
    </mat-toolbar>
    <!-- Add Content Here -->
    <router-outlet></router-outlet>
    <router-outlet name="about"></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
